services:
  node:
    image: stack-template-node:latest
    build:
      context: .
      dockerfile: Dockerfile
      # The Docker image copies blockchain/chain_spec.json at build time.
      # Regenerate that file locally after runtime changes before rebuilding.
    ports:
      - "9944:9944"
      - "30333:30333"
    volumes:
      - chain-data:/data
    command: >
      polkadot-omni-node
      --chain=/chain/chain_spec.json
      --base-path=/data
      --alice
      --force-authoring
      --dev-block-time=3000
      --unsafe-force-node-key-generation
      --rpc-external
      --rpc-cors=all
      --rpc-methods=unsafe
      --rpc-port=9944

volumes:
  chain-data:
